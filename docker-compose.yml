version: "3.9"

services:
  guardian:
    build: .
    container_name: guardian-usb
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - guardian-data:/app/data
    networks:
      - guardian-net
    # Allow nmap to run inside container
    cap_add:
      - NET_RAW
      - NET_ADMIN
    command: serve --port 8000

  # Optional: replace SQLite with PostgreSQL for production
  postgres:
    image: postgres:16-alpine
    container_name: guardian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guardian
      POSTGRES_USER: guardian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - guardian-net
    profiles:
      - postgres   # only starts with: docker compose --profile postgres up

volumes:
  guardian-data:
  postgres-data:

networks:
  guardian-net:
    driver: bridge
